document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

: rgba(245,242,237,0.08);\n      --panel: rgba(245,242,237,0.04);\n      --font-display: 'Cormorant Garamond', Georgia, serif;\n      --font-body: 'DM Sans', sans-serif;\n    }\n\n    html { scroll-behavior: smooth; }\n\n    body {\n      background: var(--stage);\n      color: var(--cream);\n      font-family: var(--font-body);\n      font-weight: 300;\n      min-height: 100vh;\n      overflow-x: hidden;\n    }\n\n    /* ── BACK LINK ── */\n    .back-home {\n      position: fixed;\n      top: 20px;\n      left: 20px;\n      z-index: 1000;\n      display: flex;\n      align-items: center;\n      gap: 7px;\n      font-size: 10px;\n      font-weight: 500;\n      letter-spacing: 0.14em;\n      text-transform: uppercase;\n      color: var(--muted);\n      text-decoration: none;\n      background: rgba(26,23,20,0.72);\n      backdrop-filter: blur(8px);\n      border: 1px solid var(--border);\n      padding: 6px 10px;\n      transition: color 0.2s ease, border-color 0.2s ease;\n    }\n    .back-home:hover { color: var(--accent-light); border-color: var(--accent); }\n    .back-home::before { content: '←'; font-size: 11px; }\n\n    /* ── LANGUAGE SELECTOR ── */\n    .lang-selector {\n      position: fixed;\n      top: 20px;\n      right: 20px;\n      z-index: 1000;\n      display: flex;\n      gap: 4px;\n      background: rgba(26,23,20,0.72);\n      backdrop-filter: blur(8px);\n      border: 1px solid var(--border);\n      padding: 6px 8px;\n    }\n    .lang-btn {\n      font-family: var(--font-body);\n      font-size: 10px;\n      font-weight: 500;\n      letter-spacing: 0.08em;\n      color: var(--muted);\n      background: none;\n      border: none;\n      cursor: pointer;\n      padding: 3px 5px;\n      text-transform: uppercase;\n      transition: color 0.2s ease;\n    }\n    .lang-btn:hover { color: var(--cream); }\n    .lang-btn.active { color: var(--accent-light); font-weight: 700; }\n\n    /* ── SHARED WIDTH ── */\n    .wrap { max-width: 1000px; margin: 0 auto; padding-left: 48px; padding-right: 48px; }\n\n    /* ── HEADER ── */\n    header {\n      padding: 100px 48px 40px;\n      max-width: 1000px;\n      margin: 0 auto;\n      animation: fadeUp 0.9s ease both;\n    }\n\n    .eyebrow {\n      font-family: var(--font-body);\n      font-size: 10px;\n      font-weight: 500;\n      letter-spacing: 0.22em;\n      text-transform: uppercase;\n      color: var(--accent-light);\n      margin-bottom: 20px;\n      display: block;\n    }\n\n    header h1 {\n      font-family: var(--font-display);\n      font-size: clamp(48px, 8vw, 84px);\n      font-weight: 300;\n      line-height: 0.95;\n      letter-spacing: -0.02em;\n      color: var(--cream);\n      margin-bottom: 6px;\n    }\n    header h1 em { font-style: italic; color: var(--muted); }\n\n    .title-line { display: flex; align-items: center; gap: 16px; margin-top: 20px; }\n    .title-line::before {\n      content: '';\n      display: block;\n      width: 32px;\n      height: 1px;\n      background: var(--accent);\n      flex-shrink: 0;\n    }\n    .role {\n      font-family: var(--font-body);\n      font-size: 13px;\n      font-weight: 400;\n      letter-spacing: 0.08em;\n      color: var(--muted);\n      text-transform: uppercase;\n    }\n    .summary {\n      font-family: var(--font-display);\n      font-size: clamp(17px, 3vw, 20px);\n      font-weight: 300;\n      line-height: 1.65;\n      color: var(--cream);\n      margin-top: 28px;\n      max-width: 64ch;\n      animation: fadeUp 0.9s 0.15s ease both;\n    }\n    .summary .instruments-line { color: var(--muted); }\n\n    /* ── FEATURED HERO ── */\n    .featured-wrap {\n      max-width: 1000px;\n      margin: 44px auto 0;\n      padding: 0 48px;\n      animation: fadeUp 0.9s 0.2s ease both;\n    }\n    .featured {\n      position: relative;\n      aspect-ratio: 16 / 8;\n      background: #000;\n      overflow: hidden;\n      border: 1px solid var(--border);\n      cursor: pointer;\n    }\n    .featured img {\n      width: 100%;\n      height: 100%;\n      object-fit: cover;\n      opacity: 0.62;\n      transition: opacity 0.4s ease, transform 4s ease;\n    }\n    .featured:hover img { opacity: 0.75; transform: scale(1.03); }\n    .featured-grad {\n      position: absolute;\n      inset: 0;\n      background: linear-gradient(to top, rgba(26,23,20,0.92) 0%, rgba(26,23,20,0.25) 50%, rgba(26,23,20,0.35) 100%);\n    }\n    .featured-play {\n      position: absolute;\n      top: 24px;\n      right: 24px;\n      width: 54px;\n      height: 54px;\n      border: 1.5px solid rgba(245,242,237,0.85);\n      border-radius: 50%;\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      transition: background 0.3s ease, border-color 0.3s ease;\n    }\n    .featured:hover .featured-play { background: rgba(184,147,90,0.85); border-color: transparent; }\n    .featured-play .tri {\n      width: 0; height: 0;\n      border-top: 8px solid transparent;\n      border-bottom: 8px solid transparent;\n      border-left: 13px solid #fff;\n      margin-left: 4px;\n    }\n    .featured-cap { position: absolute; left: 32px; right: 32px; bottom: 28px; }\n    .featured-eyebrow {\n      font-family: var(--font-body);\n      font-size: 10px;\n      font-weight: 500;\n      letter-spacing: 0.18em;\n      text-transform: uppercase;\n      color: var(--accent-light);\n    }\n    .featured-title {\n      font-family: var(--font-display);\n      font-size: clamp(28px, 5vw, 40px);\n      font-weight: 400;\n      line-height: 1.05;\n      color: var(--cream);\n      margin-top: 8px;\n    }\n    .featured-sub {\n      font-family: var(--font-body);\n      font-size: 13px;\n      color: var(--muted);\n      margin-top: 6px;\n      letter-spacing: 0.03em;\n    }\n\n    /* ── DIVIDER ── */\n    .divider {\n      display: flex;\n      align-items: center;\n      gap: 16px;\n      margin: 56px auto 30px;\n      max-width: 1000px;\n      padding: 0 48px;\n    }\n    .divider span {\n      font-size: 10px;\n      letter-spacing: 0.22em;\n      text-transform: uppercase;\n      color: var(--muted);\n      white-space: nowrap;\n      font-weight: 500;\n    }\n    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }\n\n    /* ── FILTER BAR ── */\n    .filter-section {\n      max-width: 1000px;\n      margin: 0 auto;\n      padding: 0 48px 28px;\n      animation: fadeUp 0.9s 0.15s ease both;\n    }\n    .filter-group { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }\n    .filter-label {\n      font-size: 9px;\n      font-weight: 500;\n      letter-spacing: 0.18em;\n      text-transform: uppercase;\n      color: var(--faint);\n      display: flex;\n      align-items: center;\n      padding: 0 4px;\n      min-width: 52px;\n    }\n    .filter-btn {\n      font-family: var(--font-body);\n      font-size: 11px;\n      font-weight: 400;\n      letter-spacing: 0.06em;\n      color: var(--muted);\n      background: transparent;\n      border: 1px solid var(--border);\n      padding: 5px 13px;\n      cursor: pointer;\n      transition: all 0.2s ease;\n      white-space: nowrap;\n    }\n    .filter-btn:hover { color: var(--cream); border-color: rgba(245,242,237,0.3); }\n    .filter-btn.active { background: var(--cream); color: var(--stage); border-color: var(--cream); }\n\n    /* ── RESULTS BAR ── */\n    .results-bar {\n      max-width: 1000px;\n      margin: 0 auto;\n      padding: 0 48px 18px;\n      display: flex;\n      align-items: center;\n      gap: 16px;\n    }\n    .results-count { font-size: 11px; color: var(--faint); letter-spacing: 0.06em; }\n    .results-line { flex: 1; height: 1px; background: var(--border-soft); }\n\n    /* ── MOSAIC GRID ── */\n    .grid {\n      max-width: 1000px;\n      margin: 0 auto;\n      padding: 0 48px 64px;\n      display: grid;\n      grid-template-columns: repeat(4, 1fr);\n      gap: 8px;\n    }\n\n    /* ── VIDEO TILE ── */\n    .video-card {\n      position: relative;\n      aspect-ratio: 1 / 1;\n      background: #000;\n      overflow: hidden;\n      cursor: pointer;\n      border: 1px solid transparent;\n      transition: border-color 0.25s ease;\n    }\n    .video-card:hover { border-color: var(--accent); z-index: 1; }\n    .video-card.hidden { display: none; }\n    .video-card img {\n      width: 100%;\n      height: 100%;\n      object-fit: cover;\n      opacity: 0.7;\n      transition: opacity 0.3s ease, transform 1.2s ease;\n    }\n    .video-card:hover img { opacity: 0.92; transform: scale(1.05); }\n    .card-grad {\n      position: absolute;\n      inset: 0;\n      background: linear-gradient(to top, rgba(26,23,20,0.88) 0%, rgba(26,23,20,0.05) 58%);\n    }\n    .card-caption { position: absolute; left: 13px; right: 13px; bottom: 12px; }\n    .card-instruments {\n      font-size: 8.5px;\n      font-weight: 500;\n      letter-spacing: 0.16em;\n      text-transform: uppercase;\n      color: var(--accent-light);\n      display: block;\n      margin-bottom: 3px;\n    }\n    .card-title {\n      font-family: var(--font-display);\n      font-size: 17px;\n      font-weight: 400;\n      line-height: 1.12;\n      color: var(--cream);\n    }\n    .card-context {\n      font-size: 10px;\n      color: var(--muted);\n      margin-top: 3px;\n      letter-spacing: 0.02em;\n    }\n    .card-location {\n      font-size: 9.5px;\n      color: var(--accent-light);\n      margin-top: 4px;\n      letter-spacing: 0.04em;\n      display: flex;\n      align-items: center;\n    }\n    .play-btn {\n      position: absolute;\n      top: 12px;\n      right: 12px;\n      width: 34px;\n      height: 34px;\n      border: 1.5px solid rgba(245,242,237,0.7);\n      border-radius: 50%;\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      opacity: 0;\n      transform: scale(0.85);\n      transition: opacity 0.25s ease, transform 0.25s ease, background 0.25s ease;\n    }\n    .video-card:hover .play-btn { opacity: 1; transform: scale(1); background: rgba(184,147,90,0.85); border-color: transparent; }\n    .play-btn .tri {\n      width: 0; height: 0;\n      border-top: 5px solid transparent;\n      border-bottom: 5px solid transparent;\n      border-left: 8px solid #fff;\n      margin-left: 2px;\n    }\n\n    /* ── MODAL ── */\n    .modal-overlay {\n      position: fixed;\n      inset: 0;\n      background: rgba(10,9,8,0.92);\n      z-index: 2000;\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      padding: 24px;\n      opacity: 0;\n      pointer-events: none;\n      transition: opacity 0.3s ease;\n    }\n    .modal-overlay.open { opacity: 1; pointer-events: all; }\n    .modal-inner {\n      width: 100%;\n      max-width: 880px;\n      background: var(--stage-2);\n      position: relative;\n      transform: translateY(16px);\n      transition: transform 0.3s ease;\n      border: 1px solid var(--border);\n    }\n    .modal-overlay.open .modal-inner { transform: translateY(0); }\n    .modal-close {\n      position: absolute;\n      top: -40px;\n      right: 0;\n      background: none;\n      border: none;\n      color: rgba(245,242,237,0.7);\n      font-size: 11px;\n      font-weight: 500;\n      letter-spacing: 0.14em;\n      text-transform: uppercase;\n      cursor: pointer;\n      font-family: var(--font-body);\n      padding: 4px 0;\n      transition: color 0.2s;\n      display: flex;\n      align-items: center;\n      gap: 8px;\n    }\n    .modal-close:hover { color: var(--cream); }\n    .modal-video { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }\n    .modal-video iframe { width: 100%; height: 100%; border: none; display: block; }\n    .modal-info {\n      padding: 20px 26px 24px;\n      display: flex;\n      justify-content: space-between;\n      align-items: flex-start;\n      gap: 16px;\n    }\n    .modal-title {\n      font-family: var(--font-display);\n      font-size: 25px;\n      font-weight: 400;\n      line-height: 1.15;\n      color: var(--cream);\n    }\n    .modal-meta { text-align: right; flex-shrink: 0; }\n    .modal-instruments {\n      font-size: 10px;\n      font-weight: 500;\n      letter-spacing: 0.18em;\n      text-transform: uppercase;\n      color: var(--accent-light);\n      display: block;\n      margin-bottom: 4px;\n    }\n    .modal-context { font-size: 12px; color: var(--muted); }\n\n    /* ── CONTACT ── */\n    .contact-section {\n      max-width: 1000px;\n      margin: 0 auto;\n      padding: 0 48px 0;\n      animation: fadeUp 0.9s 0.3s ease both;\n    }\n    .contact-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 8px; }\n    .contact-link {\n      display: flex;\n      align-items: center;\n      gap: 12px;\n      padding: 18px 18px;\n      text-decoration: none;\n      color: var(--cream);\n      border: 1px solid var(--border);\n      background: var(--panel);\n      transition: all 0.3s ease;\n    }\n    .contact-link:hover { background: var(--cream); color: var(--stage); border-color: var(--cream); }\n    .contact-link .c-icon { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }\n    .contact-link .c-icon svg { width: 18px; height: 18px; fill: currentColor; }\n    .contact-link .c-text strong {\n      display: block;\n      font-size: 11px;\n      font-weight: 500;\n      letter-spacing: 0.1em;\n      text-transform: uppercase;\n      margin-bottom: 2px;\n    }\n    .contact-link .c-text span { font-size: 11px; opacity: 0.7; }\n\n    /* ── CONTACT FORM ── */\n    .contact-form {\n      border: 1px solid var(--border);\n      background: var(--panel);\n      padding: 30px 26px;\n      margin-top: 8px;\n    }\n    .contact-form .form-title {\n      font-family: var(--font-display);\n      font-size: 20px;\n      font-weight: 400;\n      margin-bottom: 20px;\n      color: var(--cream);\n    }\n    .form-group { margin-bottom: 14px; }\n    .form-group label {\n      display: block;\n      font-size: 10px;\n      font-weight: 500;\n      letter-spacing: 0.15em;\n      text-transform: uppercase;\n      color: var(--faint);\n      margin-bottom: 6px;\n    }\n    .form-group input,\n    .form-group textarea {\n      width: 100%;\n      padding: 12px 14px;\n      border: 1px solid var(--border);\n      background: rgba(245,242,237,0.04);\n      font-family: var(--font-body);\n      font-size: 13px;\n      font-weight: 300;\n      color: var(--cream);\n      outline: none;\n      transition: border-color 0.2s ease, background 0.2s ease;\n      resize: none;\n      border-radius: 0;\n      -webkit-appearance: none;\n    }\n    .form-group input::placeholder,\n    .form-group textarea::placeholder { color: var(--faint); }\n    .form-group input:focus,\n    .form-group textarea:focus { border-color: var(--accent); background: rgba(245,242,237,0.07); }\n    .form-group textarea { height: 100px; }\n    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }\n    .form-submit {\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      gap: 8px;\n      width: 100%;\n      padding: 14px;\n      margin-top: 6px;\n      background: var(--cream);\n      color: var(--stage);\n      border: none;\n      cursor: pointer;\n      font-family: var(--font-body);\n      font-size: 11px;\n      font-weight: 500;\n      letter-spacing: 0.15em;\n      text-transform: uppercase;\n      transition: background 0.3s ease, color 0.3s ease;\n    }\n    .form-submit:hover { background: var(--accent); color: var(--cream); }\n    .form-success {\n      display: none;\n      text-align: center;\n      padding: 20px;\n      font-family: var(--font-display);\n      font-size: 18px;\n      color: var(--accent-light);\n    }\n\n    /* ── FOOTER ── */\n    footer {\n      margin-top: 64px;\n      padding: 24px 48px;\n      border-top: 1px solid var(--border);\n      max-width: 1000px;\n      margin-left: auto;\n a',\n    summary: 'Musicista con una passione di lunga data per le tradizioni musicali più diverse, suonando strumenti a corda, a fiato, a tastiera e voce. Il suo repertorio spazia dagli stili classici, folk, jazz e contemporanei - dalle corde pizzicate del Rinascimento agli ensemble di ottoni, dal sassofono jazz alla fisarmonica.\\n\\nStrumenti: chitarra, pianoforte, fisarmonica, bandurria, liuto spagnolo, mandolino, contrabbasso, sassofono contralto e tenore, tromba, eufonio, arpa.',\n    ctxLabel: 'Contesto', famLabel: 'Famiglia',\n    allCtx: 'Tutti', allFam: 'Tutti', cuerda: 'Archi', viento: 'Fiati', teclado: 'Tastiere', voz: 'Voce',\n    instagram: 'Instagram', youtube: 'YouTube', email: 'Email', web: 'Sito web',\n    formTitle: 'Invia un messaggio', namelabel: 'Nome', emaillabel: 'Email',\n    subjectlabel: 'Oggetto', msglabel: 'Messaggio',\n    nameph: 'Il tuo nome', emailph: 'tua@email.com', subjectph: 'Come posso aiutarti?', msgph: 'Il tuo messaggio...',\n    sendbtn: 'Invia messaggio →', formsuccess: '✓ &nbsp;Messaggio inviato - ti risponderò presto.',\n    closeModal: 'Chiudi', of: 'di', videos_label: 'video'\n  },\n  zh: {\n    role: '多乐器演奏家', videos: '视频', contact: '联系方式', featured: '精选',\n    summary: '音乐家，对多元音乐传统充满毕生热情，演奏弦乐、管乐、键盘乐器及声乐。其曲目横跨古典、民间、爵士和当代风格--从文艺复兴时期的拨弦乐器到铜管合奏，从爵士萨克斯到手风琴。\\n\\n乐器：吉他、钢琴、手风琴、班杜里亚琴、西班牙琉特琴、曼陀林、低音提琴、中音与次中音萨克斯、小号、次中音号、竖琴。',\n    ctxLabel: '背景', famLabel: '乐器族',\n    allCtx: '全部', allFam: '全部', cuerda: '弦乐', viento: '管乐', teclado: '键盘', voz: '声乐',\n    instagram: 'Instagram', youtube: 'YouTube', email: '电子邮件', web: '网站',\n    formTitle: '发送消息', namelabel: '姓名', emaillabel: '电子邮件',\n    subjectlabel: '主题', msglabel: '消息',\n    nameph: '您的姓名', emailph: '您的邮箱', subjectph: '我能帮您什么？', msgph: '您的消息...',\n    sendbtn: '发送消息 →', formsuccess: '✓ &nbsp;消息已发送 - 我会尽快与您联系。',\n    closeModal: '关闭', of: '/', videos_label: '个视频'\n  }\n};\n\nlet activeContext = 'all-context';\nlet activeFamily  = 'all-family';\nlet currentLang   = 'es';\n\n// ── BUILD GRID ──\nfunction buildGrid() {\n  const grid = document.getElementById('video-grid');\n  grid.innerHTML = '';\n  VIDEOS.forEach((v, i) => {\n    const card = document.createElement('div');\n    card.className = 'video-card';\n    card.dataset.index = i;\n    card.setAttribute('role', 'button');\n    card.setAttribute('tabindex', '0');\n    card.setAttribute('aria-label', v.title);\n    card.innerHTML = `\n      <img src=\"${(window.__resources && window.__resources[v.id]) || ''}\" alt=\"${v.title}\" loading=\"lazy\" />\n      <div class=\"card-grad\"><\u002Fdiv>\n      <div class=\"play-btn\"><div class=\"tri\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"card-caption\">\n        <span class=\"card-instruments\">${v.instruments}<\u002Fspan>\n        <div class=\"card-title\">${v.title}<\u002Fdiv>\n        <div class=\"card-context\">${v.context}<\u002Fdiv>\n        <div class=\"card-location\" data-loc=\"${v.loc}\">${PIN}${locName(v.loc)}<\u002Fdiv>\n      <\u002Fdiv>`;\n    card.addEventListener('click', () => openModal(i));\n    card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openModal(i); });\n    grid.appendChild(card);\n  });\n  applyFilters();\n}\n\n// ── FILTERS ──\nfunction applyFilters() {\n  const t = T[currentLang];\n  const cards = document.querySelectorAll('.video-card');\n  let visible = 0;\n  cards.forEach(card => {\n    const v = VIDEOS[+card.dataset.index];\n    const contextOk = activeContext === 'all-context' || v.context_key === activeContext;\n    const familyOk  = activeFamily  === 'all-family'  || v.family.includes(activeFamily);\n    const show = contextOk && familyOk;\n    card.classList.toggle('hidden', !show);\n    if (show) visible++;\n  });\n  const total = VIDEOS.length;\n  document.getElementById('results-count').textContent =\n    visible === total\n      ? `${total} ${t.videos_label}`\n      : `${visible} ${t.of} ${total} ${t.videos_label}`;\n}\n\ndocument.querySelectorAll('.filter-btn').forEach(btn => {\n  btn.addEventListener('click', () => {\n    const group  = btn.dataset.filterGroup;\n    const filter = btn.dataset.filter;\n    if (group === 'context') activeContext = filter;\n    if (group === 'family')  activeFamily  = filter;\n    document.querySelectorAll(`[data-filter-group=\"${group}\"]`).forEach(b => b.classList.remove('active'));\n    btn.classList.add('active');\n    applyFilters();\n  });\n});\n\n// ── MODAL ──\nconst modal       = document.getElementById('modal');\nconst modalIframe = document.getElementById('modal-iframe');\nconst modalTitle  = document.getElementById('modal-title');\nconst modalInstr  = document.getElementById('modal-instruments');\nconst modalCtx    = document.getElementById('modal-context');\n\nfunction openModal(index) {\n  const v = VIDEOS[index];\n  modalIframe.src     = `https://www.youtube.com/embed/${v.id}?autoplay=1&rel=0`;\n  modalTitle.textContent = v.title;\n  modalInstr.textContent = v.instruments;\n  modalCtx.innerHTML     = v.context + '&nbsp;&nbsp;·&nbsp;&nbsp;' + PIN + locName(v.loc);\n  modal.classList.add('open');\n  document.body.style.overflow = 'hidden';\n}\nfunction openModalById(id) {\n  const idx = VIDEOS.findIndex(v => v.id === id);\n  if (idx >= 0) openModal(idx);\n}\nfunction closeModal() {\n  modal.classList.remove('open');\n  modalIframe.src = '';\n  document.body.style.overflow = '';\n}\ndocument.getElementById('modal-close').addEventListener('click', closeModal);\nmodal.addEventListener('click', e => { if (e.target === modal) closeModal(); });\ndocument.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });\n\n// ── FEATURED HERO ──\nconst featuredEl = document.getElementById('featured');\nif (window.__resources && window.__resources.featuredHero) document.getElementById('featured-img').src = window.__resources.featuredHero;\nfeaturedEl.addEventListener('click', () => openModalById(FEATURED_ID));\nfeaturedEl.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openModalById(FEATURED_ID); });\n\n// ── I18N ──\nfunction setLang(lang) {\n  const t = T[lang];\n  if (!t) return;\n  currentLang = lang;\n  document.documentElement.lang = lang === 'zh' ? 'zh' : lang;\n\n  document.getElementById('role-label').textContent      = t.role;\n  document.getElementById('music-summary').innerHTML     = t.summary.replace(/\\n/g, '<br>');\n  document.getElementById('featured-label').textContent  = t.featured;\n  document.getElementById('div-videos').textContent      = t.videos;\n  document.getElementById('div-contact').textContent     = t.contact;\n  document.getElementById('fl-context').textContent      = t.ctxLabel;\n  document.getElementById('fl-family').textContent       = t.famLabel;\n  document.getElementById('f-all-context').textContent   = t.allCtx;\n  document.getElementById('f-all-family').textContent    = t.allFam;\n  document.getElementById('f-cuerda').textContent        = t.cuerda;\n  document.getElementById('f-viento').textContent        = t.viento;\n  document.getElementById('f-teclado').textContent       = t.teclado;\n  document.getElementById('f-voz').textContent           = t.voz;\n  document.getElementById('lbl-instagram').textContent   = t.instagram;\n  document.getElementById('lbl-youtube').textContent     = t.youtube;\n  document.getElementById('lbl-email').textContent       = t.email;\n  document.getElementById('lbl-web').textContent         = t.web;\n  document.getElementById('form-title').textContent      = t.formTitle;\n  document.getElementById('lbl-name').textContent        = t.namelabel;\n  document.getElementById('lbl-email-field').textContent = t.emaillabel;\n  document.getElementById('lbl-subject').textContent     = t.subjectlabel;\n  document.getElementById('lbl-message').textContent     = t.msglabel;\n  document.getElementById('name').placeholder            = t.nameph;\n  document.getElementById('email').placeholder           = t.emailph;\n  document.getElementById('subject').placeholder         = t.subjectph;\n  document.getElementById('message').placeholder         = t.msgph;\n  document.getElementById('form-submit-btn').textContent = t.sendbtn;\n  document.getElementById('form-success').innerHTML      = t.formsuccess;\n  document.getElementById('modal-close-label').textContent = t.closeModal;\n\n  document.querySelectorAll('.lang-btn').forEach(b => {\n    b.classList.toggle('active',\n      b.textContent === lang.toUpperCase() ||\n      (lang === 'zh' && b.textContent === '中文'));\n  });\n\n  document.querySelectorAll('.card-location').forEach(el => { el.innerHTML = PIN + locName(el.dataset.loc); });\n  const fl = document.getElementById('featured-loc'); if (fl) fl.innerHTML = PIN + locName('cadiz');\n\n  applyFilters();\n  localStorage.setItem('ppf-music-lang', lang);\n}\n\n// ── FORM ──\nconst form    = document.getElementById('contact-form');\nconst success = document.getElementById('form-success');\nform.addEventListener('submit', async function(e) {\n  e.preventDefault();\n  const data = new FormData(form);\n  const response = await fetch(form.action, { method: 'POST', body: data, headers: { 'Accept': 'application/json' } });\n  if (response.ok) { form.style.display = 'none'; success.style.display = 'block'; }\n});\n\n// ── INIT ──\nbuildGrid();\n(function() {\n  const saved   = localStorage.getItem('ppf-music-lang');\n  const browser = (navigator.language || 'es').split('-')[0];\n  const supported = ['en', 'fr', 'es', 'de', 'it', 'zh'];\n  setLang(saved || (supported.includes(browser) ? browser : 'es'));\n})();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
