<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pablo Pérez Fraile</title>
  <meta name="description" content="Pablo Pérez Fraile — Finance & Risk Professional · Multi-instrumentalist. Based in Geneva, Switzerland." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #F5F2ED;
      --ink: #1A1714;
      --warm-grey: #8C8680;
      --accent: #B8935A;
      --accent-light: #D4B483;
      --border: rgba(26,23,20,0.1);
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'DM Sans', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: var(--font-body);
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    /* ── LANGUAGE SELECTOR ── */
    .lang-selector {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
      display: flex;
      gap: 4px;
      background: rgba(245,242,237,0.92);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      padding: 6px 8px;
    }

    .lang-btn {
      font-family: var(--font-body);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--warm-grey);
      background: none;
      border: none;
      cursor: pointer;
      padding: 3px 5px;
      text-transform: uppercase;
      transition: color 0.2s ease;
    }
    .lang-btn:hover { color: var(--ink); }
    .lang-btn.active { color: var(--accent); font-weight: 700; }

    /* ── MAIN LAYOUT ── */
    .landing {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 32px 60px;
    }

    .inner {
      max-width: 600px;
      width: 100%;
      text-align: center;
    }

    /* ── EYEBROW ── */
    .eyebrow {
      font-family: var(--font-body);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 22px;
      opacity: 0;
      animation: fadeUp 0.8s 0.2s ease forwards;
    }

    /* ── NAME ── */
    h1 {
      font-family: var(--font-display);
      font-size: clamp(48px, 11vw, 72px);
      font-weight: 300;
      line-height: 1.0;
      letter-spacing: -0.01em;
      color: var(--ink);
      opacity: 0;
      animation: fadeUp 0.9s 0.45s ease forwards;
    }

    h1 em {
      font-style: italic;
      color: var(--warm-grey);
    }

    /* ── VERTICAL DIVIDER LINE ── */
    .divider-line {
      width: 1px;
      height: 52px;
      background: var(--accent);
      opacity: 0;
      margin: 30px auto;
      animation: growLine 0.6s 1.1s ease forwards;
    }

    /* ── PROFILE CARDS ── */
    .profiles {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
      opacity: 0;
      animation: fadeUp 0.8s 1.35s ease forwards;
    }

    .profile-card {
      padding: 28px 24px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.4);
      cursor: pointer;
      transition: background 0.35s ease, border-color 0.35s ease, transform 0.35s ease;
      text-decoration: none;
      display: block;
      text-align: left;
      position: relative;
      overflow: hidden;
    }

    .profile-card::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.35s ease;
    }

    .profile-card:hover {
      background: rgba(255,255,255,0.75);
      border-color: var(--accent-light);
      transform: translateY(-3px);
    }

    .profile-card:hover::after {
      transform: scaleX(1);
    }

    .profile-num {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.18em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 12px;
      display: block;
    }

    .profile-title {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 400;
      color: var(--ink);
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .profile-desc {
      font-size: 11.5px;
      color: var(--warm-grey);
      line-height: 1.55;
      font-weight: 300;
    }

    .profile-arrow {
      position: absolute;
      bottom: 20px;
      right: 20px;
      font-size: 15px;
      color: var(--accent-light);
      opacity: 0;
      transform: translateX(-5px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .profile-card:hover .profile-arrow {
      opacity: 1;
      transform: translateX(0);
    }

    /* ── BOTTOM LANG ROW ── */
    .lang-row {
      margin-top: 36px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0;
      opacity: 0;
      animation: fadeIn 0.6s 1.9s ease forwards;
    }

    .lang-row button {
      font-family: var(--font-body);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--warm-grey);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 10px;
      transition: color 0.2s ease;
    }

    .lang-row button + button {
      border-left: 1px solid var(--border);
    }

    .lang-row button:hover,
    .lang-row button.active {
      color: var(--accent);
    }

    /* ── FOOTER ── */
    footer {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--warm-grey);
      opacity: 0;
      animation: fadeIn 0.6s 2.2s ease forwards;
      white-space: nowrap;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes growLine {
      from { opacity: 0; transform: scaleY(0); }
      to   { opacity: 1; transform: scaleY(1); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 520px) {
      .landing { padding: 72px 20px 60px; }
      .profiles { grid-template-columns: 1fr; }
      .lang-selector { top: 12px; right: 12px; padding: 5px 6px; }
      .lang-btn { font-size: 9px; padding: 2px 4px; }
    }
  </style>
  <!-- Analytics (Umami) — same as finance page -->
  <script defer src="https://umami-three-xi.vercel.app/script.js" data-website-id="1d7282cc-387d-4941-bc7c-f4e311600a92"></script>
</head>
<body>

<!-- Fixed language selector (top-right) -->
<div class="lang-selector">
  <button class="lang-btn" onclick="setLang('en')">EN</button>
  <button class="lang-btn" onclick="setLang('es')">ES</button>
  <button class="lang-btn" onclick="setLang('fr')">FR</button>
  <button class="lang-btn" onclick="setLang('de')">DE</button>
  <button class="lang-btn" onclick="setLang('zh')">中文</button>
  <button class="lang-btn" onclick="setLang('it')">IT</button>
</div>

<!-- Main content -->
<main class="landing" role="main">
  <div class="inner">

    <p class="eyebrow">fraile.ch</p>

    <h1>Pablo <em>Pérez Fraile</em></h1>

    <div class="divider-line" aria-hidden="true"></div>

    <div class="profiles">

      <a class="profile-card" href="./finance/" id="card-finance">
        <span class="profile-num">01</span>
        <div class="profile-title" id="t-finance">Finanzas &amp; Riesgos</div>
        <p class="profile-desc" id="d-finance">Finance &amp; Risk Professional · EY · Santander · Ginebra</p>
        <span class="profile-arrow" aria-hidden="true">→</span>
      </a>

      <a class="profile-card" href="./music/" id="card-music">
        <span class="profile-num">02</span>
        <div class="profile-title" id="t-music">Música</div>
        <p class="profile-desc" id="d-music">Multiinstrumentista · Guitarra, Piano, Acordeón, Saxofón y más</p>
        <span class="profile-arrow" aria-hidden="true">→</span>
      </a>

    </div>

    <!-- Inline language switcher -->
    <div class="lang-row" aria-label="Language selector">
      <button onclick="setLang('es')" data-lang="es">ES</button>
      <button onclick="setLang('en')" data-lang="en">EN</button>
      <button onclick="setLang('fr')" data-lang="fr">FR</button>
      <button onclick="setLang('de')" data-lang="de">DE</button>
      <button onclick="setLang('it')" data-lang="it">IT</button>
      <button onclick="setLang('zh')" data-lang="zh">中文</button>
    </div>

  </div>
</main>

<footer>fraile.ch &nbsp;·&nbsp; Geneva, Switzerland</footer>

<script>
const T = {
  es: {
    tf: 'Finanzas & Riesgos',
    df: 'Profesional en Finanzas y Riesgos · EY · Santander · Ginebra',
    tm: 'Música',
    dm: 'Multiinstrumentista · Guitarra, Piano, Acordeón, Saxofón y más'
  },
  en: {
    tf: 'Finance & Risk',
    df: 'Finance & Risk Professional · EY · Santander · Geneva',
    tm: 'Music',
    dm: 'Multi-instrumentalist · Guitar, Piano, Accordion, Saxophone & more'
  },
  fr: {
    tf: 'Finance & Risques',
    df: 'Professionnel Finance & Risques · EY · Santander · Genève',
    tm: 'Musique',
    dm: 'Multi-instrumentiste · Guitare, Piano, Accordéon, Saxophone et plus'
  },
  de: {
    tf: 'Finanzen & Risiken',
    df: 'Finanz- & Risikoprofi · EY · Santander · Genf',
    tm: 'Musik',
    dm: 'Multiinstrumentalist · Gitarre, Klavier, Akkordeon, Saxophon u.v.m.'
  },
  it: {
    tf: 'Finanza & Rischi',
    df: 'Professionista Finance & Rischi · EY · Santander · Ginevra',
    tm: 'Musica',
    dm: 'Multistrumentista · Chitarra, Pianoforte, Fisarmonica, Sassofono e altro'
  },
  zh: {
    tf: '金融与风险',
    df: '金融与风险管理专业人士 · EY · Santander · 日内瓦',
    tm: '音乐',
    dm: '多乐器演奏家 · 吉他、钢琴、手风琴、萨克斯等'
  }
};

function setLang(lang) {
  const t = T[lang];
  if (!t) return;
  document.getElementById('t-finance').textContent = t.tf;
  document.getElementById('d-finance').textContent = t.df;
  document.getElementById('t-music').textContent   = t.tm;
  document.getElementById('d-music').textContent   = t.dm;
  document.documentElement.lang = lang === 'zh' ? 'zh' : lang;

  // Update top lang selector
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.toLowerCase() === lang || (lang === 'zh' && b.textContent === '中文'));
  });
  // Update bottom lang row
  document.querySelectorAll('.lang-row button').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === lang);
  });

  localStorage.setItem('ppf-lang', lang);
}

// Auto-detect on load
(function () {
  const saved   = localStorage.getItem('ppf-lang');
  const browser = (navigator.language || 'en').split('-')[0];
  const supported = ['en', 'es', 'fr', 'de', 'it', 'zh'];
  const lang = saved || (supported.includes(browser) ? browser : 'en');
  setLang(lang);
})();
</script>
</body>
</html>
