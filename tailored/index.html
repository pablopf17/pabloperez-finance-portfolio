<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Tailored Watch · Pablo Pérez</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0D0D0D;
      --surface: #1A1A1A;
      --surface2: #242424;
      --border: #333;
      --text: #E8E8E8;
      --text-muted: #999;
      --accent: #B8935A;
      --accent-dim: #8A6F3F;
      --green: #4CAF50;
      --red: #EF5350;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    html { font-size: 15px; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Login ── */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 2rem;
    }
    #login-screen h1 {
      font-size: 1.4rem;
      font-weight: 500;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }
    #login-screen p {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }
    #login-form {
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    #login-form input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem 1rem;
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    #login-form input:focus {
      border-color: var(--accent);
    }
    #login-form button {
      background: var(--accent);
      color: #0D0D0D;
      border: none;
      border-radius: 10px;
      padding: 0.85rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    #login-form button:active { opacity: 0.8; }
    #login-error {
      color: var(--red);
      font-size: 0.85rem;
      text-align: center;
      display: none;
    }

    /* ── Dashboard ── */
    #dashboard { display: none; }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
      padding: 1rem 1rem 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--accent);
    }
    header .meta {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.2rem;
    }
    #content {
      flex: 1;
      padding: 0.75rem 0.75rem 2rem;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.9rem 1rem;
      margin-bottom: 0.75rem;
      transition: border-color 0.2s;
    }
    .card:active { border-color: var(--accent-dim); }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.5rem;
      margin-bottom: 0.4rem;
    }
    .card-company {
      font-size: 0.75rem;
      color: var(--accent);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .card-date {
      font-size: 0.7rem;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .card-title {
      font-size: 1rem;
      font-weight: 500;
      line-height: 1.3;
      margin-bottom: 0.3rem;
    }
    .card-title a {
      color: var(--text);
      text-decoration: none;
    }
    .card-title a:active { color: var(--accent); }
    .card-location {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }
    .card-verdict {
      font-size: 0.8rem;
      line-height: 1.5;
      color: var(--text);
      border-left: 3px solid var(--accent-dim);
      padding-left: 0.6rem;
      margin-top: 0.4rem;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
      cursor: pointer;
      transition: -webkit-line-clamp 0.2s;
    }
    .card-verdict.expanded {
      -webkit-line-clamp: unset;
    }
    .card-verdict .tap-hint {
      display: block;
      font-size: 0.7rem;
      color: var(--accent-dim);
      margin-top: 0.3rem;
    }
    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.5rem;
    }
    .card-actions {
      display: flex;
      gap: 0.5rem;
    }
    .card-actions a, .card-actions button {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.35rem 0.7rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s;
    }
    .card-actions a:active, .card-actions button:active {
      background: var(--border);
    }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }
    .empty h2 { font-size: 1.1rem; margin-bottom: 0.5rem; }
    .empty p { font-size: 0.85rem; }

    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }

    .badge {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 600;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      text-transform: uppercase;
    }
    .badge-apply { background: #1B5E20; color: var(--green); }
    .badge-hold { background: #3E2723; color: #FFB74D; }
    .badge-skip { background: #4A1C1C; color: var(--red); }

    .footer-note {
      text-align: center;
      font-size: 0.7rem;
      color: #444;
      padding: 0.5rem 0 1.5rem;
    }
  </style>
</head>
<body>

<!-- ─── Login Screen ─── -->
<div id="login-screen">
  <h1>🔒 Tailored Watch</h1>
  <p>Needle GE — ofertas con CV listo</p>
  <form id="login-form" onsubmit="handleLogin(event)">
    <input type="password" id="password-input" placeholder="Contraseña" autocomplete="off" />
    <button type="submit">Entrar</button>
    <div id="login-error">Contraseña incorrecta</div>
  </form>
</div>

<!-- ─── Dashboard ─── -->
<div id="dashboard">
  <header>
    <h1>📋 Tailored Watch</h1>
    <div class="meta" id="meta">Cargando...</div>
  </header>
  <div id="content">
    <div class="loading">⏳ Cargando ofertas...</div>
  </div>
  <div class="footer-note">Needle GE · fraile.ch/tailored</div>
</div>

<script>
// ── Config ──────────────────────────────────────────────────
// Password hash (SHA-256 of "needle2025")
const PASSWORD_HASH = '8012ea070e50bd2cee353568748f9bacc2173a6b3870dbdb920251a77ad6b113';

// Webhook token (base64 encoded to avoid casual scraping)
const TOKEN_B64 = 'bmRsXzlpb2xtbmRydDMxNjJ5aGplMDkK';

// Apps Script deployment URL
const API_URL = 'https://script.google.com/macros/s/AKfycbydAmYIF_h3OuSCxZO1FKvZ4b1aaT7hdsDdaYvXmhC_Plx-zpr7l0HV0y-HeXfChdcW/exec';

// ── SHA-256 utility ─────────────────────────────────────────
async function sha256(str) {
  const buf = new TextEncoder().encode(str);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// ── Login ───────────────────────────────────────────────────
async function handleLogin(e) {
  e.preventDefault();
  const pw = document.getElementById('password-input').value;
  const hash = await sha256(pw);
  if (hash === PASSWORD_HASH) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'flex';
    document.getElementById('dashboard').style.flexDirection = 'column';
    loadData();
  } else {
    const err = document.getElementById('login-error');
    err.style.display = 'block';
    setTimeout(() => err.style.display = 'none', 3000);
  }
}

// ── Fetch data ─────────────────────────────────────────────
async function loadData() {
  const token = atob(TOKEN_B64).trim();
  const url = `${API_URL}?action=getTailored&token=${encodeURIComponent(token)}`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'API error');
    render(data.rows);
  } catch (err) {
    document.getElementById('content').innerHTML =
      `<div class="empty"><h2>❌ Error</h2><p>${err.message}</p></div>`;
  }
}

// ── Render cards ───────────────────────────────────────────
function render(rows) {
  const meta = document.getElementById('meta');
  const content = document.getElementById('content');

  if (!rows || rows.length === 0) {
    meta.textContent = '0 ofertas TAILORED';
    content.innerHTML = `<div class="empty"><h2>🎯 Todo al día</h2><p>No hay ofertas con estado TAILORED</p></div>`;
    return;
  }

  meta.textContent = `${rows.length} ofertas TAILORED`;

  content.innerHTML = rows.map((r, idx) => {
    // Classify verdict tone
    const verdictLower = (r.verdict || '').toLowerCase();
    let badge = '';
    if (verdictLower.includes('apply') || verdictLower.includes('strong')) badge = '<span class="badge badge-apply">Apply</span>';
    else if (verdictLower.includes('skip') || verdictLower.includes('pass')) badge = '<span class="badge badge-skip">Skip</span>';
    else if (verdictLower.includes('hold')) badge = '<span class="badge badge-hold">Hold</span>';

    const date = r.found ? r.found.substring(0, 10) : '';
    const url = r.url || '#';

    return `
      <div class="card" data-index="${idx}">
        <div class="card-header">
          <span class="card-company">${esc(r.company)}</span>
          <span class="card-date">${date} ${badge}</span>
        </div>
        <div class="card-title">
          <a href="${url}" target="_blank" rel="noopener">${esc(r.title)}</a>
        </div>
        <div class="card-location">📍 ${esc(r.location)}</div>
        <div class="card-verdict" onclick="toggleVerdict(this)">
          ${esc(r.verdict || 'Sin veredicto')}
          <span class="tap-hint">↕️ tap para expandir</span>
        </div>
        <div class="card-footer">
          <div class="card-actions">
            <a href="${url}" target="_blank" rel="noopener">🔗 Oferta</a>
            <a href="https://docs.google.com/spreadsheets/d/17hFuG0-hst0uTWZja-FFSKWOcljJKKJA0KM7H0syQDg/edit#gid=0&range=A${r.row}" target="_blank" rel="noopener">📊 Fila</a>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function toggleVerdict(el) {
  el.classList.toggle('expanded');
  const hint = el.querySelector('.tap-hint');
  if (hint) hint.textContent = el.classList.contains('expanded') ? '↕️ tap para colapsar' : '↕️ tap para expandir';
}
</script>
</body>
</html>
